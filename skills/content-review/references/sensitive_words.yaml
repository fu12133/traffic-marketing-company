      - word: "保录取"
        type: "教育承诺"
        level: "high"
        rewrite: ["升学规划", "申请指导"]
      - word: "押题"
        type: "教育承诺"
        level: "high"
        rewrite: ["考点覆盖", "考情分析"]
      - word: "命中率"
        type: "教育承诺"
        level: "high"
        rewrite: ["知识点覆盖", "考纲匹配"]
      - word: "速成"
        type: "教育承诺"
