# ============================================================
# 五、平台引流/诱导词
# ============================================================
platform_violation_words:
  - category: "引流词"
    words:
      - word: "加微信"
        type: "平台引流"
        level: "high"
        platforms: ["抖音", "快手", "小红书", "微信"]
        rewrite: ["私信获取", "点击链接"]
      - word: "加V"
        type: "平台引流"
        level: "high"
        platforms: ["抖音", "快手", "小红书"]
        rewrite: ["官方渠道", "站内联系"]
      - word: "公众号"
        type: "平台引流"
        level: "medium"
        platforms: ["抖音", "快手", "小红书"]
        rewrite: ["官方账号", "关注获取"]
      - word: "扫码"
        type: "平台引流"
        level: "medium"
        platforms: ["抖音", "快手", "微信"]
        rewrite: ["点击领取", "平台内领取"]
      - word: "私信我"
        type: "平台引流"
        level: "low"
        platforms: ["抖音"]
        rewrite: ["评论区互动", "关注获取更多"]

  - category: "诱导点击"
    words:
      - word: "震惊"
        type: "诱导点击"
        level: "medium"
        rewrite: ["值得关注", "重要消息"]
      - word: "不转不是中国人"
        type: "诱导点击"
        level: "critical"
        rewrite: ["欢迎分享"]
      - word: "紧急通知"
        type: "诱导点击"
        level: "medium"
        rewrite: ["重要提醒", "温馨提示"]
      - word: "赶紧看"
        type: "诱导点击"
        level: "low"
        rewrite: ["值得了解", "建议收藏"]

# ============================================================
# 六、敏感/违禁内容
# ============================================================
sensitive_words:
  - category: "政治敏感"
    words:
      - word: "政治人物名"
        type: "政治敏感"
        level: "critical"
        note: "需动态更新，涉及现任领导人需特别处理"
      - word: "敏感事件"
        type: "政治敏感"
        level: "critical"
        note: "需动态更新，按网信办要求执行"

  - category: "色情低俗"
    words:
      - word: "色情词汇"
        type: "色情低俗"
        level: "critical"
        note: "引用开源色情词库"
      - word: "低俗暗示"
        type: "色情低俗"
        level: "high"

  - category: "暴力违禁"
    words:
      - word: "枪支"
        type: "违禁品"
        level: "critical"
      - word: "毒品"
        type: "违禁品"
        level: "critical"
      - word: "赌博"
        type: "违禁品"
        level: "critical"
      - word: "博彩"
        type: "违禁品"
        level: "critical"

# ============================================================
# 七、合规检测配置
# ============================================================
detection_config:
  ocr:
    enabled: true
    engines: ["paddleocr", "tesseract"]
    min_confidence: 0.85

  text_analysis:
    embedding_model: "text2vec-base-chinese"
    nlp_model: "bert-base-chinese"
    similarity_threshold: 0.85

  batch:
    max_parallel: 10
    timeout_seconds: 120
    output_format: "json"

  risk_mapping:
    critical: "封号"
    high: "限流封禁"
    medium: "警告"
    low: "限流观察"
    pass: "合规通过"

  rewrite_strategy:
    min_change: "增量改写-精准替换"
    full_rewrite: "全篇重写"
    restructure: "结构重组"
    smart_auto: "智能改写-自动匹配校验"

# ============================================================
# 八、开源依赖配置
# ============================================================
open_source_deps:
  sensitive_word_libs:
    - name: "sensitive-word"
      url: "https://github.com/houbb/sensitive-word"
      usage: "Java基础敏感词库，可参考词库结构"
      license: "Apache-2.0"
    - name: "dfa-sensitive-word"
      url: "https://github.com/importcjj/dfa-sensitive-word"
      usage: "Python DFA算法敏感词过滤"
      license: "MIT"
    - name: "f单独敏感词库"
      url: "https://github.com/fighting41love/funNLP"
      usage: "中文NLP资源，含敏感词库"
      license: "Apache-2.0"

  nlp_models:
    - name: "ernie-3.0"
      url: "https://github.com/PaddlePaddle/PaddleNLP"
      usage: "文本分类/语义理解，可用于违规内容识别"
      license: "Apache-2.0"
    - name: "text2vec-base-chinese"
      url: "https://huggingface.co/shibing624/text2vec-base-chinese"
      usage: "文本相似度计算，用于改写内容验证"
      license: "MIT"
    - name: "roberta-wwm-ext"
      url: "https://huggingface.co/hfl/chinese-roberta-wwm-ext"
      usage: "中文预训练模型，违规文本检测"
      license: "Apache-2.0"

  ocr:
    - name: "PaddleOCR"
      url: "https://github.com/PaddlePaddle/PaddleOCR"
      usage: "图片文字提取，用于封面/素材文字检测"
      license: "Apache-2.0"
    - name: "EasyOCR"
      url: "https://github.com/JaidedAI/EasyOCR"
      usage: "轻量OCR，可用于多语言素材检测"
      license: "Apache-2.0"

  content_moderation:
    - name: "BetterDummy-API"
      url: "https://github.com/tzcoo/BetterDummy-API"
      usage: "文本内容安全检测API参考"
      license: "MIT"
    - name: "nsfwjs"
      url: "https://github.com/infinitered/nsfwjs"
      usage: "图片NSFW检测，敏感画面识别"
      license: "MIT"

  standards:
    - name: "广告法词库"
      url: "https://github.com/madawei2699/ad-law"
      usage: "广告法违规词库参考"
      license: "MIT"
    - name: "违禁词过滤"
      url: "https://github.com/toolgood/ToolGood.Words"
      usage: "多语言敏感词过滤，含广告违规词"
      license: "MIT"
