# Davy 敏感词配置库 v3.2.1
# 格式说明：
#   word: 违规词或短语
#   type: 违规类型
#   level: 风险等级 (critical/high/medium/low)
#   platform: 适用平台 (all/特定平台列表)
#   rewrite: 推荐合规改写方案

# ============================================================
# 一、极限词（绝对化用语）
# ============================================================
extreme_words:
  - category: "范畴极限词"
    words:
      - word: "最好"
        type: "绝对化用语"
        level: "medium"
        rewrite: ["值得信赖", "广受好评", "优质之选"]
      - word: "最佳"
        type: "绝对化用语"
        level: "medium"
        rewrite: ["优质", "出色", "出色之选"]
      - word: "第一品牌"
        type: "绝对化用语"
        level: "medium"
        rewrite: ["行业知名品牌", "口碑品牌", "专注品牌"]
      - word: "行业第一"
        type: "绝对化用语"
        level: "medium"
        rewrite: ["行业领先", "行业前列", "业内知名"]
      - word: "全网最低"
        type: "绝对化用语"
        level: "medium"
        rewrite: ["限时优惠价", "超值之选", "特惠体验价"]
      - word: "国家级"
        type: "绝对化用语"
        level: "critical"
        rewrite: ["高标准", "权威认证"]
      - word: "最高级"
        type: "绝对化用语"
        level: "critical"
        rewrite: ["高级", "优质"]
      - word: "顶级"
        type: "绝对化用语"
        level: "medium"
        rewrite: ["优质", "卓越", "出色"]
      - word: "极致"
        type: "绝对化用语"
        level: "medium"
        rewrite: ["出色", "优质", "非凡"]
      - word: "唯一"
        type: "绝对化用语"
        level: "medium"
        rewrite: ["专注", "专业", "主打"]
      - word: "首选"
        type: "绝对化用语"
        level: "low"
        rewrite: ["热门之选", "值得考虑", "备受青睐"]
      - word: "首创"
        type: "绝对化用语"
        level: "medium"
        rewrite: ["率先推出", "全新推出", "创新打造"]
      - word: "独一无二"
        type: "绝对化用语"
        level: "medium"
        rewrite: ["别具特色", "风格独特", "与众不同"]
      - word: "100%"
        type: "绝对化用语"
        level: "medium"
        rewrite: ["高比例", "超预期"]
      - word: "百分之百"
        type: "绝对化用语"
        level: "medium"
        rewrite: ["高比例", "超预期"]

  - category: "比较极限词"
    words:
      - word: "全网"
        type: "比较词"
        level: "medium"
        platforms: ["抖音", "快手", "小红书", "微信"]
        rewrite: ["全平台（需数据）", "多平台"]
      - word: "全国"
        type: "比较词"
        level: "low"
        rewrite: ["多地区", "广泛"]
      - word: "全城"
        type: "比较词"
        level: "low"
        rewrite: ["本地", "同城"]
      - word: "超值"
        type: "比较词"
        level: "low"
        rewrite: ["高性价比", "实惠"]
      - word: "最低价"
        type: "比较词"
        level: "medium"
        rewrite: ["优惠价", "好价", "限时价"]

  - category: "承诺极限词"
    words:
      - word: "包过"
        type: "教育承诺"
        level: "high"
        rewrite: ["系统备考", "全科辅导", "科学学习方案"]
      - word: "保过"
        type: "教育承诺"
        level: "high"
        rewrite: ["系统备考", "全面辅导"]
      - word: "零风险"
        type: "金融违规"
        level: "high"
        rewrite: ["低风险", "风控完善", "多重保障"]
      - word: "稳赚"
        type: "金融违规"
        level: "critical"
        rewrite: ["风险可控", "科学风控"]
      - word: "保本"
        type: "金融违规"
        level: "critical"
        rewrite: ["浮动收益", "业绩参考"]
      - word: "无效退款"
        type: "虚假承诺"
        level: "medium"
        rewrite: ["售后保障", "满意保障"]

# ============================================================
# 二、医疗健康敏感词
# ============================================================
medical_words:
  - category: "医疗功效"
    words:
      - word: "治愈"
        type: "医疗功效"
        level: "critical"
        rewrite: ["改善", "调理", "养护"]
      - word: "治疗"
        type: "医疗功效"
        level: "high"
        rewrite: ["调理", "改善", "养护", "舒缓"]
      - word: "根治"
        type: "医疗功效"
        level: "critical"
        rewrite: ["有效控制", "长期管理", "科学干预"]
      - word: "痊愈"
        type: "医疗功效"
        level: "critical"
        rewrite: ["恢复", "康复（需资质）"]
      - word: "见效"
        type: "医疗功效"
        level: "high"
        rewrite: ["坚持使用逐步改善", "持续使用效果更佳"]
      - word: "速效"
        type: "医疗功效"
        level: "high"
        rewrite: ["科学配比", "高效配方（需资质）"]
      - word: "特效"
        type: "医疗功效"
        level: "high"
        rewrite: ["显著（需数据）", "有效"]
      - word: "神效"
        type: "医疗功效"
        level: "critical"
        rewrite: ["有效", "显著（需数据）"]
      - word: "三天见效"
        type: "医疗功效"
        level: "critical"
        rewrite: ["坚持使用逐步改善", "持续使用效果更佳"]
      - word: "祖传秘方"
        type: "医疗功效"
        level: "high"
        rewrite: ["经典配方", "科学配比", "专业研发"]
      - word: "老中医"
        type: "医疗资质暗示"
        level: "high"
        rewrite: ["专业配方", "从业经验", "专业团队"]
      - word: "临床验证"
        type: "医疗资质暗示"
        level: "high"
        rewrite: ["科学验证", "实验室测试"]

  - category: "医美敏感"
    words:
      - word: "隆胸"
        type: "医美手术"
        level: "critical"
        rewrite: ["胸部塑形（需资质）"]
      - word: "抽脂"
        type: "医美手术"
        level: "critical"
        rewrite: ["形体雕塑（需资质）"]
      - word: "术前术后"
        type: "医美对比"
        level: "high"
        rewrite: ["项目展示", "方案说明"]
      - word: "对比照"
        type: "医美对比"
        level: "high"
        rewrite: ["效果示意（标注个体差异）"]
      - word: "无痛"
        type: "医美安全"
        level: "medium"
        rewrite: ["舒适体验", "体验舒适"]
      - word: "无副作用"
        type: "医美安全"
        level: "high"
        rewrite: ["温和配方", "科学配方"]
      - word: "玻尿酸"
        type: "医美项目"
        level: "medium"
        rewrite: ["填充类项目", "注射类项目"]

# ============================================================
# 三、金融敏感词
# ============================================================
financial_words:
  - category: "收益承诺"
    words:
      - word: "保本"
        type: "金融保本"
        level: "critical"
        rewrite: ["浮动收益", "业绩比较基准"]
      - word: "保收益"
        type: "金融保本"
        level: "critical"
        rewrite: ["业绩参考"]
      - word: "稳赚"
        type: "金融诱导"
        level: "critical"
        rewrite: ["风险可控", "科学风控"]
      - word: "稳赢"
        type: "金融诱导"
        level: "critical"
        rewrite: ["科学管理", "稳健运营"]
      - word: "躺赚"
        type: "金融诱导"
        level: "high"
        rewrite: ["智能管理", "省心管理"]
      - word: "无风险"
        type: "金融诱导"
        level: "critical"
        rewrite: ["低风险（需资质）", "风控严格"]
      - word: "高收益"
        type: "金融诱导"
        level: "high"
        rewrite: ["业绩表现", "收益参考"]
      - word: "财富自由"
        type: "金融诱导"
        level: "medium"
        rewrite: ["财务目标", "资产增值", "财富规划"]
      - word: "限时抢购"
        type: "金融诱导"
        level: "low"
        platforms: ["金融类"]
        rewrite: ["开放认购中", "产品开放期"]

  - category: "非法金融"
    words:
      - word: "虚拟币"
        type: "非法金融"
        level: "critical"
      - word: "数字货币"
        type: "非法金融"
        level: "high"
        context: "需排除合规的央行数字货币"
      - word: "炒币"
        type: "非法金融"
        level: "critical"
      - word: "配资"
        type: "非法金融"
        level: "critical"
      - word: "带单"
        type: "非法金融"
        level: "high"
      - word: "拉人头"
        type: "传销特征"
        level: "critical"

